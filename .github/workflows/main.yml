name: CI

on:
  push:
    branches:
      - '*'
  pull_request:
      types: [opened, synchronize, reopened]

jobs:
  build:
    name: Maven Build
    if: github.ref != 'refs/heads/master' || github.repository != 'portfolio-performance/portfolio'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Cache Maven repository
      uses: actions/cache@v5
      with:
        path: |
          ~/.m2/repository
          ~/.sonar/cache
        key: ${{ runner.os }}-mvn
        restore-keys: |
          ${{ runner.os }}-mvn-
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: zulu
    - name: Set up Maven
      uses: stCarolas/setup-maven@v5
      with:
        maven-version: 3.9.11
    - name: Install NSIS and jsign
      run: |
        sudo apt-get update && sudo apt-get install -y nsis
        wget https://github.com/ebourg/jsign/releases/download/7.4/jsign_7.4_all.deb
        sudo dpkg -i jsign_7.4_all.deb
    - name: Build with Maven
      run: |
        mvn verify \
        --batch-mode \
        --file portfolio-app/pom.xml
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          portfolio-product/target/products/
          portfolio-product/target/*.zip
        if-no-files-found: warn

  build-analyze:
    name: Maven Build + Sonar Analysis
    #if: github.ref == 'refs/heads/master' && github.repository == 'portfolio-performance/portfolio'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Cache Maven repository
      uses: actions/cache@v5
      with:
        path: |
          ~/.m2/repository
          ~/.sonar/cache
        key: ${{ runner.os }}-mvn
        restore-keys: |
          ${{ runner.os }}-mvn-
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: zulu
    - name: Set up Maven
      uses: stCarolas/setup-maven@v5
      with:
        maven-version: 3.9.11
    - name: Install NSIS and jsign
      run: |
        sudo apt-get update && sudo apt-get install -y nsis
        wget https://github.com/ebourg/jsign/releases/download/7.4/jsign_7.4_all.deb
        sudo dpkg -i jsign_7.4_all.deb
    - name: Build with Maven
      run: |
        mvn verify sonar:sonar \
        --batch-mode \
        -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
        -Dinstaller.skip=false \
        --file portfolio-app/pom.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: installers
        path: portfolio-product/target/products/PortfolioPerformance-*
        if-no-files-found: warn
